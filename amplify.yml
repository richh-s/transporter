version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Setting environment variables..."
        - export NEXT_PUBLIC_API_URL=https://dev-api.wetruck.ai/api/v1
        - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "Building with NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
        - export NEXT_PUBLIC_API_URL=https://dev-api.wetruck.ai/api/v1
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
